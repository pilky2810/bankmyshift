# Render Blueprint for Bank My Shift.
#
# How to use:
# 1. Push this `backend/` folder to its own Git repo (GitHub/GitLab/Bitbucket) — Render
#    Blueprints deploy from a connected repo, not a local zip.
# 2. In the Render dashboard: New > Blueprint > connect that repo > Apply.
# 3. Render will provision the Postgres database and the web service together, in the
#    Frankfurt (EU) region (Render has no separate London region — Frankfurt keeps data
#    in the EEA, satisfying the UK/EU residency requirement in compliance-and-data-protection.md).
# 4. JWT_SECRET is auto-generated by Render (see generateValue below) — you don't need to
#    run `openssl rand -base64 48` yourself if you deploy this way.
# 5. SENDGRID_API_KEY and EMAIL_FROM are marked sync:false — add them in the Render
#    dashboard once you're ready to turn on email (not required for initial deploy).
# 6. CORS_ALLOWED_ORIGIN starts as a placeholder — update it once the frontend is deployed.

databases:
  - name: bankmyshift-db
    plan: free
    region: frankfurt
    postgresMajorVersion: 16

services:
  - type: web
    name: bankmyshift-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: bankmyshift-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: RESET_TOKEN_EXPIRES_MIN
        value: "30"
      - key: CORS_ALLOWED_ORIGIN
        value: https://REPLACE-WITH-YOUR-FRONTEND-URL
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW_MIN
        value: "15"
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
